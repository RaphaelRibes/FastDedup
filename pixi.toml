[workspace]
name = "FDedup"
version = "1.1.0"
description = "A fast and memory-efficient FASTX PCR deduplication tool"
authors = ["Raphaël Ribes", "Céline Mandier"]
platforms = ["linux-64", "osx-64", "linux-aarch64", "osx-arm64"]
channels = ["conda-forge"]

[tool.pixitainer]
add-file = ["Cargo.lock:/opt/conf/Cargo.lock", "Cargo.toml:/opt/conf/Cargo.toml", "src:/opt/conf/src"]
post-command = ["pixi run cargo build --release", "mv ./target/release/fdedup /usr/local/bin/fdedup"]
keep-def = true
env = ["default"]
seamless = true
output = "fdedup.sif"
pixi-version = "0.64.0"

[dependencies]
rust = ">=1.93.1,<1.94"
c-compiler = ">=1.11.0,<2"
cmake = ">=4.2.3,<5"
cxx-compiler = ">=1.11.0,<2"
make = ">=4.4.1,<5"


### PROFILE
[feature.profile.tasks._profile-normal]
description = "Profile FDedup with uncompressed output using samply"
cmd = "samply record -s -o normal.json.gz ./target/release/fdedup data/E14_seq2_R1_001.fastq.gz data/E14_seq2_R1_001_dedup.fastq -v --force"
inputs = ["data/E14_seq2_R1_001.fastq.gz"]

[feature.profile.tasks._profile-compressed]
description = "Profile FDedup with compressed output using samply"
cmd = "samply record -s -o gz.json.gz ./target/release/fdedup data/E14_seq2_R1_001.fastq.gz data/E14_seq2_R1_001.fastq_dedup.gz -v --force"
inputs = ["data/E14_seq2_R1_001.fastq.gz"]

[feature.profile.dependencies]
samply = "*"
inferno = "*"

[tasks.demo]
description = "Run a demonstration of FDedup"
cmd = "./demo.sh"

[tasks.mk_tarball]
cmd = "cargo build --release && mv target/release/fdedup . && tar -czvf fdedup_$(grep -m 1 -oP '^version\\s*=\\s*\"\\K[^\"]+' pixi.toml)_linux_x86_64.tar.gz fdedup && rm fdedup_$(grep -m 1 -oP '^version\\s*=\\s*\"\\K[^\"]+' pixi.toml)"

[environments]
profile = ["profile"]
